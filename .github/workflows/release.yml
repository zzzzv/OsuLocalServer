name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download osu!lazer DLLs
        shell: pwsh
        run: |
          $targetDir = "$env:LOCALAPPDATA\osulazer\current"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

          $release = Invoke-RestMethod https://api.github.com/repos/ppy/osu/releases/latest
          $nupkg = $release.assets | Where-Object { $_.name -like '*full.nupkg' -and $_.name -notlike '*linux*' -and $_.name -notlike '*osx*' } | Select-Object -First 1
          if (-not $nupkg) { exit 1 }

          $zipPath = "$env:TEMP\osu-lazer.zip"
          Invoke-WebRequest -Uri $nupkg.browser_download_url -OutFile $zipPath

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          $dlls = $zip.Entries | Where-Object { $_.Name -like '*.dll' }
          foreach ($dll in $dlls) {
            $dest = Join-Path $targetDir $dll.Name
            try { [System.IO.Compression.ZipFileExtensions]::ExtractToFile($dll, $dest, $true) } catch { }
          }
          $zip.Dispose()

      - name: Publish
        run: dotnet publish OsuLocalServer/OsuLocalServer.csproj -c Release -o out

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = Select-String '<Version>([^<]+)</Version>' OsuLocalServer/OsuLocalServer.csproj | %{ $_.Matches.Groups[1].Value }
          "tag=v$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe=out/OsuLocalServer-$ver.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          git fetch --tags origin
          if (git tag | Select-String "^$tag$") {
            Write-Host "Release $tag already exists, skipping."
            return
          }
          $prev = git describe --tags --abbrev=0 2>$null
          if ($prev) { $range = "$prev..HEAD" } else { $range = "HEAD" }
          $msg = git log $range --format="- %s" --reverse
          if (-not $msg) { $msg = git log -1 --format=%s }
          gh release create $tag "${{ steps.version.outputs.exe }}" --title $tag --notes "$msg"
